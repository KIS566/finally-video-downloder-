<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Video Downloader Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 30px 0 20px;
        }

        .header h1 {
            font-size: 38px;
            background: linear-gradient(135deg, #f093fb, #f5576c, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #aaa;
            font-size: 15px;
            margin-top: 5px;
        }

        .badge-free {
            background: linear-gradient(135deg, #43e97b, #38f9d7);
            color: #000;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            margin-left: 10px;
            -webkit-text-fill-color: #000;
        }

        .card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .input-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .input-group input {
            flex: 1;
            padding: 16px 22px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            background: rgba(255,255,255,0.08);
            color: white;
            font-size: 16px;
            min-width: 200px;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #4facfe;
        }

        .input-group input::placeholder {
            color: #666;
        }

        .btn {
            padding: 16px 30px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(79,172,254,0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .sites {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 15px;
        }

        .site-badge {
            background: rgba(255,255,255,0.08);
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 13px;
            color: #aaa;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .alert {
            padding: 14px 18px;
            border-radius: 12px;
            margin-top: 15px;
            display: none;
            font-weight: 500;
        }

        .alert-success {
            background: rgba(67,233,123,0.15);
            color: #43e97b;
            border: 1px solid rgba(67,233,123,0.2);
        }

        .alert-error {
            background: rgba(245,87,108,0.15);
            color: #f5576c;
            border: 1px solid rgba(245,87,108,0.2);
        }

        .alert-info {
            background: rgba(79,172,254,0.15);
            color: #4facfe;
            border: 1px solid rgba(79,172,254,0.2);
        }

        .video-section {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 16px;
            background: #000;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-info {
            margin-top: 20px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .video-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            word-break: break-word;
        }

        .video-meta {
            color: #888;
            font-size: 14px;
        }

        .menu-container {
            position: relative;
            display: inline-block;
        }

        .menu-btn {
            background: rgba(255,255,255,0.08);
            border: none;
            color: white;
            font-size: 28px;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            transition: background 0.3s;
            line-height: 1;
        }

        .menu-btn:hover {
            background: rgba(255,255,255,0.15);
        }

        .menu-dropdown {
            display: none;
            position: absolute;
            right: 0;
            top: 100%;
            margin-top: 8px;
            background: rgba(30,30,50,0.98);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 8px 0;
            min-width: 250px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            z-index: 1000;
            max-height: 400px;
            overflow-y: auto;
        }

        .menu-dropdown.show {
            display: block;
            animation: fadeIn 0.2s ease;
        }

        .menu-dropdown button {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: #ddd;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            background: none;
            border: none;
            width: 100%;
            cursor: pointer;
            transition: background 0.2s;
            font-family: inherit;
            text-align: left;
        }

        .menu-dropdown button:hover {
            background: rgba(79,172,254,0.15);
            color: white;
        }

        .menu-dropdown .download-option {
            color: #4facfe;
        }

        .menu-dropdown .download-option:hover {
            background: rgba(79,172,254,0.2);
        }

        .menu-divider {
            height: 1px;
            background: rgba(255,255,255,0.06);
            margin: 6px 0;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            margin-bottom: 20px;
        }

        .back-btn {
            color: white;
            text-decoration: none;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            border-radius: 30px;
            background: rgba(255,255,255,0.08);
            transition: background 0.3s;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.15);
        }

        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #4facfe;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            color: #555;
            font-size: 13px;
            padding: 20px;
        }

        .footer a {
            color: #4facfe;
            text-decoration: none;
        }

        @media (max-width: 600px) {
            .header h1 { font-size: 28px; }
            .card { padding: 20px; }
            .input-group input { min-width: 150px; }
            .video-title { font-size: 18px; }
            .menu-btn { font-size: 24px; padding: 6px 12px; }
            .top-bar { flex-wrap: wrap; gap: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⬇️ Video Downloader Pro <span class="badge-free">100% FREE</span></h1>
            <p>YouTube • Instagram • Facebook • TikTok</p>
        </div>

        <div class="card" id="searchCard">
            <div class="input-group">
                <input type="text" id="urlInput" placeholder="Paste video URL here...">
                <button class="btn btn-primary" id="fetchBtn">🎬 Load Video</button>
            </div>
            <div class="sites">
                <span class="site-badge">▶️ YouTube</span>
                <span class="site-badge">📸 Instagram</span>
                <span class="site-badge">👍 Facebook</span>
                <span class="site-badge">🐦 Twitter</span>
                <span class="site-badge">🎵 TikTok</span>
            </div>
            <p style="text-align: center; color: #666; font-size: 12px; margin-top: 15px;">
                ⚡ 100% Free • No Registration • Direct Download
            </p>
        </div>

        <div class="alert" id="alert"></div>

        <div class="video-section" id="videoSection">
            <div class="top-bar">
                <button class="back-btn" id="backBtn">← Back</button>
                <div class="menu-container">
                    <button class="menu-btn" id="menuToggle">⋮</button>
                    <div class="menu-dropdown" id="menuDropdown">
                        <button class="download-option" onclick="downloadVideo('1080p')">
                            ⬇️ Download 1080p
                        </button>
                        <button class="download-option" onclick="downloadVideo('720p')">
                            ⬇️ Download 720p
                        </button>
                        <button class="download-option" onclick="downloadVideo('480p')">
                            ⬇️ Download 480p
                        </button>
                        <button class="download-option" onclick="downloadVideo('360p')">
                            ⬇️ Download 360p
                        </button>
                        <div class="menu-divider"></div>
                        <button class="download-option" onclick="downloadVideo('mp3')">
                            🎵 Download MP3 Audio
                        </button>
                        <div class="menu-divider"></div>
                        <button onclick="setPlaybackSpeed(0.5)">🐢 0.5x Speed</button>
                        <button onclick="setPlaybackSpeed(0.75)">🐢 0.75x Speed</button>
                        <button onclick="setPlaybackSpeed(1)">⏯️ Normal Speed</button>
                        <button onclick="setPlaybackSpeed(1.25)">🚀 1.25x Speed</button>
                        <button onclick="setPlaybackSpeed(1.5)">🚀 1.5x Speed</button>
                        <button onclick="setPlaybackSpeed(2)">🚀 2x Speed</button>
                        <div class="menu-divider"></div>
                        <button onclick="togglePiP()">🖼️ Picture-in-Picture</button>
                        <button onclick="toggleFullscreen()">⛶ Fullscreen</button>
                        <div class="menu-divider"></div>
                        <button onclick="copyLink()">📋 Copy Video Link</button>
                        <button onclick="openInNewTab()">🔗 Open in New Tab</button>
                    </div>
                </div>
            </div>

            <div class="video-wrapper">
                <iframe id="videoFrame" src="" allow="fullscreen; picture-in-picture; autoplay" allowfullscreen></iframe>
            </div>

            <div class="video-info">
                <div class="video-title" id="videoTitle">Loading video...</div>
                <div class="video-meta" id="videoMeta">-</div>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p id="loadingText">Processing...</p>
        </div>

        <div class="footer">
            <p>🔒 100% Free • No Registration</p>
            <p style="font-size:12px; margin-top:5px;">⚡ Videos download directly from this page</p>
        </div>
    </div>

    <script>
        // ✅ IMPORTANT: अपना सही Worker URL यहाँ डालें
        const WORKER_URL = 'https://finally-video-downloder.k9891p.workers.dev';
        
        let currentVideoId = null;
        let currentVideoUrl = null;

        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.className = `alert alert-${type}`;
            alert.innerHTML = message;
            alert.style.display = 'block';
            setTimeout(() => {
                alert.style.display = 'none';
            }, 5000);
        }

        function setLoading(show, text = 'Processing...') {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
            document.getElementById('loadingText').textContent = text;
        }

        function extractVideoId(url) {
            let match = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/);
            if (match) return match[1];
            match = url.match(/instagram\.com\/(?:p|reel)\/([a-zA-Z0-9_-]+)/);
            if (match) return match[1];
            return null;
        }

        function detectPlatform(url) {
            if (url.includes('youtube.com') || url.includes('youtu.be')) return 'youtube';
            if (url.includes('instagram.com')) return 'instagram';
            if (url.includes('facebook.com') || url.includes('fb.watch')) return 'facebook';
            if (url.includes('twitter.com') || url.includes('x.com')) return 'twitter';
            if (url.includes('tiktok.com')) return 'tiktok';
            return 'unknown';
        }

        function getEmbedUrl(videoId, platform) {
            if (platform === 'youtube') {
                return `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1`;
            } else if (platform === 'instagram') {
                return `https://www.instagram.com/p/${videoId}/embed/`;
            } else if (platform === 'facebook') {
                return `https://www.facebook.com/plugins/video.php?href=https://www.facebook.com/watch/?v=${videoId}`;
            } else if (platform === 'tiktok') {
                return `https://www.tiktok.com/embed/${videoId}`;
            }
            return null;
        }

        async function loadVideo() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) {
                showAlert('Please enter a video URL!', 'error');
                return;
            }

            const platform = detectPlatform(url);
            let videoId = extractVideoId(url);

            if (!videoId) {
                showAlert('Could not extract video ID. Please check the URL.', 'error');
                return;
            }

            currentVideoId = videoId;
            currentVideoUrl = url;

            setLoading(true, 'Fetching video info...');

            try {
                console.log('Calling Worker:', WORKER_URL);
                console.log('Video URL:', url);

                const response = await fetch(`${WORKER_URL}/api/info`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });

                console.log('Response status:', response.status);

                if (!response.ok) {
                    const errorText = await response.text();
                    console.log('Error response:', errorText);
                    throw new Error(`Server error: ${response.status}`);
                }

                const data = await response.json();
                console.log('Video info:', data);

                document.getElementById('videoSection').style.display = 'block';
                document.getElementById('searchCard').style.display = 'none';

                document.getElementById('videoTitle').textContent = data.title || 'Video';
                document.getElementById('videoMeta').textContent = 
                    `${data.uploader || 'Unknown'} • ${data.views ? Number(data.views).toLocaleString() : '0'} views`;

                const embedUrl = getEmbedUrl(videoId, platform);
                if (embedUrl) {
                    document.getElementById('videoFrame').src = embedUrl;
                }

                setLoading(false);
                showAlert('✅ Video loaded! Click ⋮ menu to download.', 'success');

            } catch (error) {
                console.error('Error:', error);
                showAlert('Failed to load video. Please try again. Error: ' + error.message, 'error');
                setLoading(false);
            }
        }

        async function downloadVideo(quality) {
            if (!currentVideoUrl) {
                showAlert('No video loaded!', 'error');
                return;
            }

            setLoading(true, `Preparing ${quality} download...`);

            try {
                const response = await fetch(`${WORKER_URL}/api/download`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        url: currentVideoUrl,
                        quality: quality
                    })
                });

                if (!response.ok) {
                    throw new Error('Download failed');
                }

                const data = await response.json();
                
                if (data.url) {
                    window.open(data.url, '_blank');
                    showAlert(`✅ Download started for ${quality}`, 'success');
                } else {
                    throw new Error('No download URL received');
                }

                setLoading(false);

            } catch (error) {
                console.error('Download error:', error);
                showAlert('Download failed. Please try again.', 'error');
                setLoading(false);
            }
        }

        function setPlaybackSpeed(speed) {
            const iframe = document.getElementById('videoFrame');
            try {
                iframe.contentWindow.postMessage(
                    JSON.stringify({
                        event: 'command',
                        func: 'setPlaybackRate',
                        args: [speed]
                    }),
                    '*'
                );
                showAlert(`Speed set to ${speed}x`, 'success');
            } catch (e) {
                showAlert('Please click the video first, then try again.', 'info');
            }
        }

        function togglePiP() {
            try {
                const video = document.querySelector('video');
                if (document.pictureInPictureElement) {
                    document.exitPictureInPicture();
                    showAlert('Exited Picture-in-Picture', 'info');
                } else if (video) {
                    video.requestPictureInPicture();
                    showAlert('Entered Picture-in-Picture', 'success');
                } else {
                    showAlert('No video found for PiP mode.', 'error');
                }
            } catch (e) {
                showAlert('PiP not supported in this browser.', 'error');
            }
        }

        function toggleFullscreen() {
            const wrapper = document.querySelector('.video-wrapper');
            if (!document.fullscreenElement) {
                wrapper.requestFullscreen().catch(() => {
                    const iframe = document.getElementById('videoFrame');
                    if (iframe.requestFullscreen) {
                        iframe.requestFullscreen();
                    }
                });
                showAlert('Entered fullscreen', 'success');
            } else {
                document.exitFullscreen();
                showAlert('Exited fullscreen', 'info');
            }
        }

        function copyLink() {
            if (!currentVideoId) {
                showAlert('No video loaded!', 'error');
                return;
            }
            const url = `https://youtu.be/${currentVideoId}`;
            navigator.clipboard.writeText(url).then(() => {
                showAlert('📋 Link copied to clipboard!', 'success');
            }).catch(() => {
                showAlert('Failed to copy link', 'error');
            });
        }

        function openInNewTab() {
            if (!currentVideoId) {
                showAlert('No video loaded!', 'error');
                return;
            }
            window.open(`https://youtu.be/${currentVideoId}`, '_blank');
        }

        function goBack() {
            document.getElementById('videoSection').style.display = 'none';
            document.getElementById('searchCard').style.display = 'block';
            document.getElementById('videoFrame').src = '';
        }

        document.getElementById('menuToggle').addEventListener('click', function(e) {
            e.stopPropagation();
            document.getElementById('menuDropdown').classList.toggle('show');
        });

        document.addEventListener('click', function() {
            document.getElementById('menuDropdown').classList.remove('show');
        });

        document.getElementById('fetchBtn').addEventListener('click', loadVideo);
        document.getElementById('backBtn').addEventListener('click', goBack);
        document.getElementById('urlInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loadVideo();
        });

        window.addEventListener('load', () => {
            setTimeout(() => {
                showAlert('✨ Paste a video URL and click "Load Video"!', 'info');
            }, 500);
        });
    </script>
</body>
</html>
