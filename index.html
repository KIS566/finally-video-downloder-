<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader - Working 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e, #16213e);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            text-align: center;
            font-size: 2em;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea, #e91e63);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .platform-badges {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.3s;
        }

        .badge.active {
            background: #667eea;
            transform: scale(1.05);
        }

        .url-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            font-size: 15px;
            color: white;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.12);
        }

        input::placeholder {
            color: #666;
        }

        .btn {
            padding: 16px 28px;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            flex: 1;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .quality-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .quality-option {
            flex: 1;
            padding: 12px;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
            min-width: 70px;
        }

        .quality-option.active {
            background: rgba(102, 126, 234, 0.3);
            border-color: #667eea;
        }

        .quality-option:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .loading-container {
            text-align: center;
            padding: 30px;
            display: none;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .result-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }

        .result-card img {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 15px;
            max-height: 300px;
            object-fit: cover;
        }

        .result-card h3 {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .result-card p {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .download-options {
            display: grid;
            gap: 10px;
            margin-top: 15px;
        }

        .download-link {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            text-decoration: none;
            color: white;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .download-link:hover {
            background: rgba(102, 126, 234, 0.2);
            border-color: #667eea;
            transform: translateX(5px);
        }

        .quality-badge {
            padding: 4px 12px;
            background: #667eea;
            border-radius: 12px;
            font-size: 12px;
        }

        .message {
            padding: 15px;
            border-radius: 12px;
            margin-top: 15px;
            display: none;
            font-size: 14px;
        }

        .message.error {
            background: rgba(255, 68, 68, 0.15);
            border: 1px solid rgba(255, 68, 68, 0.3);
            color: #ff6b6b;
        }

        .message.success {
            background: rgba(76, 175, 80, 0.15);
            border: 1px solid rgba(76, 175, 80, 0.3);
            color: #69f0ae;
        }

        .message.info {
            background: rgba(102, 126, 234, 0.15);
            border: 1px solid rgba(102, 126, 234, 0.3);
            color: #82b1ff;
        }

        .service-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .service-card {
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .service-card:hover {
            background: rgba(102, 126, 234, 0.2);
            border-color: #667eea;
        }

        .service-card .icon {
            font-size: 30px;
            margin-bottom: 8px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            .url-input-group {
                flex-direction: column;
            }
            .quality-selector {
                gap: 5px;
            }
            .quality-option {
                font-size: 11px;
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📥 Video Downloader</h1>
        <p class="subtitle">YouTube • Instagram • Facebook • TikTok • Twitter/X</p>

        <div class="platform-badges" id="platformBadges">
            <span class="badge active" data-platform="all">🌐 All</span>
            <span class="badge" data-platform="youtube">▶️ YouTube</span>
            <span class="badge" data-platform="instagram">📸 Instagram</span>
            <span class="badge" data-platform="facebook">👤 Facebook</span>
            <span class="badge" data-platform="tiktok">🎵 TikTok</span>
            <span class="badge" data-platform="twitter">🐦 Twitter</span>
        </div>

        <div class="url-input-group">
            <input type="text" id="urlInput" placeholder="Video URL yahan paste karein..." autocomplete="off">
            <button class="btn btn-secondary" id="pasteBtn" onclick="pasteURL()">📋</button>
        </div>

        <div class="quality-selector" id="qualitySelector">
            <div class="quality-option active" data-quality="best">✨ Best</div>
            <div class="quality-option" data-quality="1080p">1080p</div>
            <div class="quality-option" data-quality="720p">720p</div>
            <div class="quality-option" data-quality="480p">480p</div>
            <div class="quality-option" data-quality="audio">🎵 MP3</div>
        </div>

        <button class="btn btn-primary" id="downloadBtn" onclick="processVideo()">
            🔍 Download Karein
        </button>

        <div class="loading-container" id="loading">
            <div class="spinner"></div>
            <p id="loadingText">Video information fetch kar rahe hain...</p>
        </div>

        <div class="result-card" id="resultCard"></div>
        <div class="download-options" id="downloadOptions"></div>
        <div class="message" id="messageBox"></div>
    </div>

    <script>
        // State
        let selectedPlatform = 'all';
        let selectedQuality = 'best';

        // Platform badges
        document.querySelectorAll('#platformBadges .badge').forEach(badge => {
            badge.addEventListener('click', function() {
                document.querySelectorAll('#platformBadges .badge').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                selectedPlatform = this.dataset.platform;
            });
        });

        // Quality selector
        document.querySelectorAll('#qualitySelector .quality-option').forEach(option => {
            option.addEventListener('click', function() {
                document.querySelectorAll('#qualitySelector .quality-option').forEach(o => o.classList.remove('active'));
                this.classList.add('active');
                selectedQuality = this.dataset.quality;
            });
        });

        // Paste button
        async function pasteURL() {
            try {
                const text = await navigator.clipboard.readText();
                if (text) {
                    document.getElementById('urlInput').value = text;
                    showMessage('✅ URL clipboard se paste ho gayi!', 'success');
                }
            } catch (err) {
                document.getElementById('urlInput').focus();
                showMessage('Please manually paste karein ya URL type karein', 'info');
            }
        }

        // Show messages
        function showMessage(text, type = 'info') {
            const msg = document.getElementById('messageBox');
            msg.textContent = text;
            msg.className = `message ${type}`;
            msg.style.display = 'block';
            setTimeout(() => { msg.style.display = 'none'; }, 6000);
        }

        // Detect platform
        function detectPlatform(url) {
            if (/youtube\.com|youtu\.be/.test(url)) return 'youtube';
            if (/instagram\.com/.test(url)) return 'instagram';
            if (/facebook\.com|fb\.watch/.test(url)) return 'facebook';
            if (/tiktok\.com/.test(url)) return 'tiktok';
            if (/twitter\.com|x\.com/.test(url)) return 'twitter';
            return 'unknown';
        }

        // Extract YouTube ID
        function getYouTubeID(url) {
            const patterns = [
                /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/,
                /youtube\.com\/watch\?.*v=([a-zA-Z0-9_-]{11})/
            ];
            for (let p of patterns) {
                const match = url.match(p);
                if (match) return match[1];
            }
            return null;
        }

        // Main function
        async function processVideo() {
            const url = document.getElementById('urlInput').value.trim();
            
            if (!url) {
                showMessage('❌ Please video URL enter karein!', 'error');
                return;
            }

            const btn = document.getElementById('downloadBtn');
            const loading = document.getElementById('loading');
            const resultCard = document.getElementById('resultCard');
            const downloadOptions = document.getElementById('downloadOptions');

            // Reset
            resultCard.style.display = 'none';
            resultCard.innerHTML = '';
            downloadOptions.innerHTML = '';
            btn.disabled = true;
            loading.style.display = 'block';

            const platform = detectPlatform(url);
            document.getElementById('loadingText').textContent = 
                `${platform.toUpperCase()} video fetch kar rahe hain...`;

            try {
                let result = null;

                // Try multiple working APIs
                switch (platform) {
                    case 'youtube':
                        result = await processYouTube(url);
                        break;
                    case 'instagram':
                        result = await processInstagram(url);
                        break;
                    case 'facebook':
                        result = await processFacebook(url);
                        break;
                    case 'tiktok':
                        result = await processTikTok(url);
                        break;
                    case 'twitter':
                        result = await processTwitter(url);
                        break;
                    default:
                        result = await processGeneric(url);
                }

                if (result && result.success) {
                    displayResult(result);
                    showMessage('✅ Video ready! Download link pe click karein.', 'success');
                } else {
                    showFallbackServices(url, platform);
                }
            } catch (error) {
                console.error('Error:', error);
                showFallbackServices(url, platform);
                showMessage('⚠️ Direct download available nahi hai. External services try karein.', 'info');
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        }

        // YouTube processing (using multiple working methods)
        async function processYouTube(url) {
            const videoId = getYouTubeID(url);
            if (!videoId) return null;

            // Method 1: Piped API (usually works)
            try {
                const response = await fetch(`https://pipedapi.kavin.rocks/streams/${videoId}`);
                const data = await response.json();
                
                if (data && data.videoStreams) {
                    const streams = data.videoStreams;
                    const audioStreams = data.audioStreams || [];
                    
                    let selectedStream;
                    switch (selectedQuality) {
                        case '1080p':
                            selectedStream = streams.find(s => s.quality.includes('1080')) || streams[streams.length - 1];
                            break;
                        case '720p':
                            selectedStream = streams.find(s => s.quality.includes('720')) || streams[Math.floor(streams.length/2)];
                            break;
                        case '480p':
                            selectedStream = streams.find(s => s.quality.includes('480')) || streams[0];
                            break;
                        case 'audio':
                            return {
                                success: true,
                                title: data.title,
                                thumbnail: data.thumbnailUrl,
                                uploader: data.uploader,
                                duration: data.duration,
                                downloadUrl: audioStreams[audioStreams.length - 1]?.url,
                                type: 'audio'
                            };
                        default:
                            selectedStream = streams[streams.length - 1];
                    }

                    return {
                        success: true,
                        title: data.title,
                        thumbnail: data.thumbnailUrl,
                        uploader: data.uploader,
                        duration: data.duration,
                        downloadUrl: selectedStream?.url || streams[0]?.url,
                        formats: streams.map(s => ({
                            quality: s.quality,
                            url: s.url,
                            format: s.format
                        })),
                        type: 'video'
                    };
                }
            } catch (e) {
                console.log('Piped API failed, trying next...');
            }

            // Method 2: Invidious API
            try {
                const invidiousResponse = await fetch(`https://invidious.snopyta.org/api/v1/videos/${videoId}`);
                const invidiousData = await invidiousResponse.json();
                
                if (invidiousData && invidiousData.formatStreams) {
                    const formats = invidiousData.formatStreams;
                    return {
                        success: true,
                        title: invidiousData.title,
                        thumbnail: invidiousData.videoThumbnails?.[0]?.url,
                        uploader: invidiousData.author,
                        duration: invidiousData.lengthSeconds,
                        downloadUrl: formats[formats.length - 1]?.url,
                        formats: formats.map(f => ({
                            quality: f.qualityLabel || f.quality,
                            url: f.url,
                            format: f.container
                        })),
                        type: 'video'
                    };
                }
            } catch (e) {
                console.log('Invidious API failed');
            }

            // Method 3: NoEmbed + direct thumbnail
            try {
                const oembedResponse = await fetch(`https://noembed.com/embed?url=${encodeURIComponent(url)}`);
                const oembedData = await oembedResponse.json();
                
                return {
                    success: true,
                    title: oembedData.title || 'YouTube Video',
                    thumbnail: `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`,
                    uploader: oembedData.author_name,
                    downloadUrl: null,
                    fallback: true,
                    type: 'youtube'
                };
            } catch (e) {
                console.log('oEmbed failed');
            }

            return null;
        }

        // Instagram processing
        async function processInstagram(url) {
            try {
                // Try ddinstagram.com
                const ddUrl = url.replace('instagram.com', 'ddinstagram.com');
                const response = await fetch(ddUrl);
                const html = await response.text();
                
                const videoMatch = html.match(/<meta property="og:video"[^>]+content="([^"]+)"/);
                const imageMatch = html.match(/<meta property="og:image"[^>]+content="([^"]+)"/);
                const titleMatch = html.match(/<meta property="og:title"[^>]+content="([^"]+)"/);
                
                const mediaUrl = videoMatch?.[1] || imageMatch?.[1];
                
                if (mediaUrl) {
                    return {
                        success: true,
                        title: titleMatch?.[1] || 'Instagram Post',
                        thumbnail: imageMatch?.[1],
                        downloadUrl: mediaUrl,
                        type: videoMatch ? 'video' : 'image'
                    };
                }
            } catch (e) {
                console.log('ddinstagram failed');
            }

            return null;
        }

        // Facebook processing
        async function processFacebook(url) {
            try {
                const response = await fetch(`https://www.facebook.com/plugins/video/oembed.json/?url=${encodeURIComponent(url)}`);
                const data = await response.json();
                
                if (data && data.html) {
                    const videoMatch = data.html.match(/src="([^"]+)"/);
                    return {
                        success: true,
                        title: data.title || 'Facebook Video',
                        thumbnail: data.thumbnail_url,
                        downloadUrl: videoMatch?.[1],
                        type: 'video'
                    };
                }
            } catch (e) {
                console.log('Facebook oEmbed failed');
            }
            return null;
        }

        // TikTok processing
        async function processTikTok(url) {
            try {
                const response = await fetch(`https://www.tiktok.com/oembed?url=${encodeURIComponent(url)}`);
                const data = await response.json();
                
                if (data) {
                    return {
                        success: true,
                        title: data.title || 'TikTok Video',
                        thumbnail: data.thumbnail_url,
                        downloadUrl: null,
                        fallback: true,
                        type: 'tiktok',
                        embedHtml: data.html
                    };
                }
            } catch (e) {
                console.log('TikTok oEmbed failed');
            }
            return null;
        }

        // Twitter processing
        async function processTwitter(url) {
            try {
                const response = await fetch(`https://publish.twitter.com/oembed?url=${encodeURIComponent(url)}`);
                const data = await response.json();
                
                if (data) {
                    return {
                        success: true,
                        title: 'Twitter Video',
                        thumbnail: null,
                        downloadUrl: null,
                        fallback: true,
                        type: 'twitter',
                        html: data.html
                    };
                }
            } catch (e) {
                console.log('Twitter oEmbed failed');
            }
            return null;
        }

        // Generic processing
        async function processGeneric(url) {
            const platform = detectPlatform(url);
            switch (platform) {
                case 'youtube': return processYouTube(url);
                case 'instagram': return processInstagram(url);
                case 'facebook': return processFacebook(url);
                case 'tiktok': return processTikTok(url);
                case 'twitter': return processTwitter(url);
                default: return null;
            }
        }

        // Display result
        function displayResult(result) {
            const resultCard = document.getElementById('resultCard');
            const downloadOptions = document.getElementById('downloadOptions');

            let html = '';
            
            if (result.thumbnail) {
                html += `<img src="${result.thumbnail}" alt="${result.title}" onerror="this.style.display='none'">`;
            }
            
            html += `<h3>${result.title || 'Video'}</h3>`;
            if (result.uploader) html += `<p>👤 ${result.uploader}</p>`;
            if (result.duration) {
                const mins = Math.floor(result.duration / 60);
                const secs = result.duration % 60;
                html += `<p>⏱ ${mins}:${secs.toString().padStart(2, '0')}</p>`;
            }

            resultCard.innerHTML = html;
            resultCard.style.display = 'block';

            // Download options
            let downloadHtml = '<h4 style="color:#aaa;margin-bottom:10px;">📥 Download:</h4>';

            if (result.downloadUrl) {
                downloadHtml += `
                    <a href="${result.downloadUrl}" target="_blank" class="download-link" download>
                        <span>Direct Download <span class="quality-badge">${selectedQuality}</span></span>
                        <span>⬇️</span>
                    </a>
                `;
            }

            if (result.formats && result.formats.length > 0) {
                result.formats.forEach((format, i) => {
                    if (format.url && i < 5) {
                        downloadHtml += `
                            <a href="${format.url}" target="_blank" class="download-link" download>
                                <span>${format.quality || `Format ${i+1}`} ${format.format ? '(' + format.format + ')' : ''}</span>
                                <span>⬇️</span>
                            </a>
                        `;
                    }
                });
            }

            if (result.fallback) {
                downloadHtml += `<p style="color:#aaa;font-size:13px;margin-top:10px;">⚠️ Direct download available nahi hai. Neeche external services try karein.</p>`;
            }

            downloadOptions.innerHTML = downloadHtml;
        }

        // Show fallback services
        function showFallbackServices(url, platform) {
            const downloadOptions = document.getElementById('downloadOptions');
            const videoId = getYouTubeID(url);

            const services = {
                youtube: [
                    { name: 'Y2Mate', url: `https://www.y2mate.com/youtube/${videoId}` },
                    { name: 'SaveFrom', url: `https://en.savefrom.net/1-youtube-video-downloader-5vv/` },
                    { name: '9xBuddy', url: `https://9xbuddy.com/process?url=${encodeURIComponent(url)}` },
                    { name: 'Loader.to', url: `https://loader.to/en17/` },
                    { name: 'Y2Meta', url: `https://www.y2meta.com/en/youtube/${videoId}` }
                ],
                instagram: [
                    { name: 'SaveInsta', url: `https://saveinsta.app/en/download?url=${encodeURIComponent(url)}` },
                    { name: 'SnapInsta', url: `https://snapinsta.app/en/download?url=${encodeURIComponent(url)}` },
                    { name: 'IGram', url: `https://igram.io/?url=${encodeURIComponent(url)}` }
                ],
                facebook: [
                    { name: 'FDown', url: `https://fdown.net/download.php?url=${encodeURIComponent(url)}` },
                    { name: 'GetFVid', url: `https://www.getfvid.com/downloader?url=${encodeURIComponent(url)}` },
                    { name: 'FBDown', url: `https://fbdown.net/download.php?url=${encodeURIComponent(url)}` }
                ],
                tiktok: [
                    { name: 'SnapTik', url: `https://snaptik.app/en/download?url=${encodeURIComponent(url)}` },
                    { name: 'TikMate', url: `https://tikmate.online/download?url=${encodeURIComponent(url)}` },
                    { name: 'SSSTikTok', url: `https://ssstik.io/en?url=${encodeURIComponent(url)}` }
                ],
                twitter: [
                    { name: 'TwitterVD', url: `https://twittervid.com/download?url=${encodeURIComponent(url)}` },
                    { name: 'TWDown', url: `https://twdown.net/download.php?url=${encodeURIComponent(url)}` }
                ]
            };

            const platformServices = services[platform] || services.youtube;

            let html = `
                <div style="margin-top:15px;padding:15px;background:rgba(255,255,255,0.03);border-radius:12px;">
                    <h4 style="color:#aaa;margin-bottom:15px;">🔗 Working Download Services:</h4>
                    <div class="service-grid">
                        ${platformServices.map(s => `
                            <div class="service-card" onclick="window.open('${s.url}', '_blank')">
                                <div class="icon">🔗</div>
                                <div style="font-size:14px;font-weight:600;">${s.name}</div>
                                <div style="font-size:11px;color:#888;">Click to open</div>
                            </div>
                        `).join('')}
                    </div>
                    <p style="color:#888;font-size:12px;margin-top:15px;text-align:center;">
                        💡 Tips: 
                        <br>1. Naye tab mein service open hogi
                        <br>2. Wahan URL paste karein (auto-filled hoga)
                        <br>3. Download button dhundhein
                    </p>
                </div>
            `;

            downloadOptions.innerHTML = html;
        }

        // Enter key support
        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                processVideo();
            }
        });

        // Auto-paste from clipboard on focus
        document.getElementById('urlInput').addEventListener('focus', function() {
            if (!this.value) {
                pasteURL();
            }
        });
